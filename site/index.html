<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Paste text and watch live word-frequency, sentiment, and readability visualizations animate as you type. No server, no upload."
    />
    <meta name="theme-color" content="#f5f0e6" />
    <title>Lexiscope</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f5f0e6'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23b0402f' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Public+Sans:wght@400;600;700&display=swap"
    />
    <script type="module" crossorigin src="./assets/index-CrJZltJq.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DQxnlwGG.css">
  </head>
  <body>
    <main id="app">
      <header>
        <div class="brand">
          <h1>
            <svg class="mark" width="30" height="30" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M15 15l5.5 5.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
              <path d="M7 8.5h6M7 11.5h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <span>Lexiscope</span>
          </h1>
          <p class="tagline">See how your writing reads as you type. No sign-up, no upload, nothing leaves your browser.</p>
        </div>
        <div class="header-actions">
          <a
            id="github-link"
            href="https://github.com/ctkrug/lexiscope"
            target="_blank"
            rel="noopener"
            >View on GitHub</a
          >
          <button type="button" id="theme-toggle" aria-label="Toggle dark mode">Night</button>
        </div>
      </header>
      <textarea
        id="input"
        aria-label="Text to analyze"
        placeholder="Paste some text to see it analyzed, or drop a .txt file here..."
        spellcheck="false"
      ></textarea>
      <div id="file-controls">
        <label id="file-drop-label" for="file-input">Load a .txt file&hellip;</label>
        <input type="file" id="file-input" accept=".txt,text/plain" />
      </div>
      <section id="settings">
        <label for="word-limit">
          Words shown
          <input type="number" id="word-limit" min="3" max="50" value="15" />
        </label>
        <label for="extra-stopwords">
          Extra stopwords (comma-separated)
          <input type="text" id="extra-stopwords" placeholder="e.g. lexiscope, said" />
        </label>
      </section>
      <span id="pending-indicator" role="status" aria-live="polite" hidden>Updating&hellip;</span>
      <div id="stats-strip"></div>
      <div id="action-buttons">
        <button type="button" id="copy-summary" aria-live="polite">Copy analysis summary</button>
        <button type="button" id="clear-input">Clear text</button>
      </div>
      <section id="visualizations">
        <div class="panel">
          <h2>Word frequency</h2>
          <svg id="frequency-chart"></svg>
        </div>
        <div class="panel">
          <h2>Sentiment</h2>
          <svg id="sentiment-gauge"></svg>
        </div>
        <div class="panel">
          <h2>Sentiment by sentence</h2>
          <svg id="sentence-sentiment-strip"></svg>
        </div>
        <div class="panel">
          <h2>Readability</h2>
          <svg id="readability-panel"></svg>
        </div>
      </section>
    </main>
  </body>
</html>
