<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Paste text and watch live word-frequency, sentiment, and readability visualizations animate as you type. No server, no upload."
    />
    <meta name="theme-color" content="#4f8ef7" />
    <title>Lexiscope</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <div>
          <h1>Lexiscope</h1>
          <p>Paste or type text below. Everything updates live, entirely in your browser.</p>
        </div>
        <button type="button" id="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
      </header>
      <textarea
        id="input"
        placeholder="Paste some text to see it analyzed, or drop a .txt file here..."
        spellcheck="false"
      ></textarea>
      <div id="file-controls">
        <label id="file-drop-label" for="file-input">Load a .txt file&hellip;</label>
        <input type="file" id="file-input" accept=".txt,text/plain" />
      </div>
      <section id="settings">
        <label for="word-limit">
          Words shown
          <input type="number" id="word-limit" min="3" max="50" value="15" />
        </label>
        <label for="extra-stopwords">
          Extra stopwords (comma-separated)
          <input type="text" id="extra-stopwords" placeholder="e.g. lexiscope, said" />
        </label>
      </section>
      <span id="pending-indicator" role="status" aria-live="polite" hidden>Updating&hellip;</span>
      <div id="stats-strip"></div>
      <button type="button" id="copy-summary" aria-live="polite">Copy analysis summary</button>
      <section id="visualizations">
        <div class="panel">
          <h2>Word frequency</h2>
          <svg id="frequency-chart"></svg>
        </div>
        <div class="panel">
          <h2>Sentiment</h2>
          <svg id="sentiment-gauge"></svg>
        </div>
        <div class="panel">
          <h2>Sentiment by sentence</h2>
          <svg id="sentence-sentiment-strip"></svg>
        </div>
        <div class="panel">
          <h2>Readability</h2>
          <svg id="readability-panel"></svg>
        </div>
      </section>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
